<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIPE — Node Graph Pipeline</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <div class="logo"><span class="logo-mark">▶</span><span class="logo-text">PIPE</span></div>
        <div class="tagline">node graph file transformer</div>
      </div>
      <div class="header-center" id="header-center"></div>
      <div class="header-right">
        <button id="btn-workspaces" class="btn btn-ghost"><span>◫</span><span>Workspaces</span></button>
        <button id="btn-save-workspace" class="btn btn-ws"><span>⊙</span><span>Save</span></button>
        <button id="btn-clear" class="btn btn-clear" title="Clear canvas and file from memory">✕ Clear</button>
        <div class="header-sep"></div>
        <button id="btn-add-source" class="btn btn-add-source"><span>◈</span><span>Add Source</span></button>
        <button id="btn-add-node" class="btn btn-add-node"><span>+</span><span>Add Node</span></button>
        <div class="header-sep"></div>
        <button id="btn-run" class="btn btn-run" disabled><span class="btn-icon">▶</span><span>Run</span></button>
        <button id="btn-download" class="btn btn-download" disabled><span class="btn-icon">↓</span><span>Download</span></button>
      </div>
    </header>

    <div id="canvas-wrap">
      <div id="canvas-hint">
        <div class="hint-lines">
          <div>Add nodes with <kbd>+ Add Node</kbd></div>
          <div>Drag from <span class="port-hint out">●</span> output to <span class="port-hint in">●</span> input to connect</div>
          <div>Connect any node to <span class="end-hint">END</span> to collect results</div>
        </div>
      </div>
      <svg id="svg-connections">
        <defs>
          <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 z" fill="#47c6ff" opacity="0.8"/>
          </marker>
        </defs>
        <g id="connections-group"></g>
        <path id="drag-edge" d="" fill="none" stroke="#e8ff47" stroke-width="2" stroke-dasharray="6 4" opacity="0" pointer-events="none"/>
      </svg>
      <div id="canvas" tabindex="0"></div>
    </div>

    <div id="bottom-panel" class="hidden">
      <div id="stats-bar">
        <div class="stat"><span class="stat-label">TOTAL</span><span class="stat-val" id="stat-total">—</span></div>
        <div class="stat"><span class="stat-label">PASSED</span><span class="stat-val stat-ok" id="stat-passed">—</span></div>
        <div class="stat"><span class="stat-label">DROPPED</span><span class="stat-val stat-drop" id="stat-dropped">—</span></div>
        <div class="stat"><span class="stat-label">ERRORS</span><span class="stat-val stat-err" id="stat-errors">—</span></div>
        <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
        <button id="btn-collapse-output" class="btn-collapse">▼</button>
      </div>
      <div id="output-area"></div>
    </div>
  </div>

  <!-- NODE EDITOR MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <span class="modal-label">NODE EDITOR</span>
          <input type="text" id="modal-node-name" class="modal-node-name" placeholder="Node name…">
        </div>
        <button id="modal-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="editor-hint" id="editor-hint"></div>
        <div class="editor-wrap">
          <div class="editor-gutter" id="editor-gutter"></div>
          <textarea id="modal-editor" class="code-editor" spellcheck="false"></textarea>
        </div>
        <div class="editor-test">
          <div class="test-label">QUICK TEST</div>
          <div id="test-inputs-wrap" class="test-inputs-wrap"></div>
          <div id="test-output" class="test-output hidden"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
        <button id="btn-save-to-library" class="btn-save-lib">◈ Save to Library</button>
        <button id="modal-save" class="btn btn-save">Save Node</button>
      </div>
    </div>
  </div>

  <!-- LIBRARY MODAL -->
  <div id="library-overlay" class="modal-overlay hidden">
    <div class="modal library-modal">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <span class="modal-label">NODE LIBRARY</span>
          <span class="library-subtitle">Click to add to canvas</span>
        </div>
        <button id="library-close" class="modal-close">✕</button>
      </div>
      <div class="library-body">
        <div class="library-toolbar">
          <input type="text" id="library-search" class="library-search" placeholder="Search…">
          <div id="library-categories" class="library-categories"></div>
          <button id="btn-new-from-scratch" class="btn-new-scratch"><span>+</span><span>New from scratch</span></button>
        </div>
        <div id="library-grid" class="library-grid"></div>
      </div>
    </div>
  </div>

  <!-- WORKSPACES MODAL -->
  <div id="ws-overlay" class="modal-overlay hidden">
    <div class="modal ws-modal">
      <div class="modal-header">
        <div class="modal-title-wrap"><span class="modal-label">WORKSPACES</span></div>
        <button id="ws-close" class="modal-close">✕</button>
      </div>
      <div id="ws-list" class="ws-list"></div>
    </div>
  </div>

  <!-- SAVE WORKSPACE MODAL -->
  <div id="ws-save-overlay" class="modal-overlay hidden">
    <div class="modal ws-save-modal">
      <div class="modal-header">
        <div class="modal-title-wrap"><span class="modal-label">SAVE WORKSPACE</span></div>
        <button id="ws-save-close" class="modal-close">✕</button>
      </div>
      <div class="ws-save-body">
        <label class="ws-save-label">Workspace name</label>
        <input type="text" id="ws-name-input" class="ws-name-input" placeholder="My Pipeline…" maxlength="80">
      </div>
      <div class="modal-footer">
        <button id="ws-save-cancel" class="btn btn-ghost">Cancel</button>
        <button id="ws-save-confirm" class="btn btn-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Hidden shared file input -->
  <input type="file" id="source-file-input" hidden>

  <script src="js/graph.js"></script>
  <script src="js/executor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
